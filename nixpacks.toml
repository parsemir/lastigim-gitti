[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "cd client && npm run build",
  "cd server && npx prisma generate && npm run build"
]

[start]
cmd = "cd server && npx prisma db push --accept-data-loss && NODE_ENV=production node dist/index.js"
